<!DOCTYPE html>
<html>

<head>
    <title>Float Model</title>
    <style>
        #img1 {
            float: left;
        }

        #img2 {
            float: right;
        }

        p {
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>FLoat image</h1>
    <p><img src="plants.jpeg" alt="plants" style="width:100px;height:100px;" id="img1">
        Here, image will float to the right and left.
        <img src="plants.jpeg" alt="plants" style="width:100px;height:100px;" id="img2">
    </p>
</body>

</html>
